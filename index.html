<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>3D Birthday Card</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  font-family: Arial;
  overflow: hidden;
}

/* กล่องหลัก */
.card-container {
  perspective: 1000px;
}

/* การ์ด */
.card {
  width: 400px;
  height: 250px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1s;
  cursor: pointer;
}

/* ตอนเปิด */
.card.open {
  transform: rotateY(-180deg);
}

/* ด้านหน้า */
.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 20px;
  backface-visibility: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* หน้าแรก */
.front {
  background: white;
}

/* ด้านใน */
.back {
  background: #fff0f5;
  transform: rotateY(180deg);
}

/* ข้อความ */
h1 {
  color: #ff4da6;
  font-size: 26px;
  opacity: 0;
}

p {
  opacity: 0;
}

/* fade ตอนเปิด */
.show h1 {
  animation: fadeIn 3s forwards;
}
.show p {
  animation: fadeIn 4s forwards;
}

@keyframes fadeIn {
  to {opacity: 1;}
}

/* หัวใจ */
.heart {
  position: fixed;
  bottom: -20px;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(0); opacity: 1;}
  100% {transform: translateY(-800px); opacity: 0;}
}

</style>
</head>

<body>

<div class="card-container">
  <div class="card" id="card" onclick="openCard()">

    <!-- ด้านหน้า -->
    <div class="front">
      <h2>กดเปิดการ์ด 🎁</h2>
    </div>

    <!-- ด้านใน -->
    <div class="back" id="inside">
      <h1>Happy Birthday My Mom 🎂💖</h1>
      <p>อย่าลืม 2000❤️</p>
    </div>

  </div>
</div>

<script>
let opened = false;

function openCard() {
  if (opened) return;
  opened = true;

  const card = document.getElementById("card");
  const inside = document.getElementById("inside");

  card.classList.add("open");

  setTimeout(() => {
    inside.classList.add("show");
    startHearts();
  }, 500);
}

function startHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);
}

/* confetti */
function startConfetti() {
  setInterval(() => {
    const conf = document.createElement("div");
    conf.className = "confetti";

    conf.style.left = Math.random() * window.innerWidth + "px";
    conf.style.background = ["#ff4d4d","#ffd11a","#4dd2ff","#66ff66","#ff66cc"][Math.floor(Math.random()*5)];
    conf.style.animationDuration = (2 + Math.random()*3) + "s";

    document.body.appendChild(conf);
    setTimeout(() => conf.remove(), 5000);
  }, 100);
}
</script>

</body>
</html>
